<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Investment BYMA 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
  <style>
    /* TODO: Incluye todos los estilos CSS originales del archivo (139k chars truncados) */
    /* Copia los estilos .bonos-page, .bnd-*, .lc-*, etc. desde tu portfolio-5.html original */
    /* Ejemplo clave para soberanos: */
    .bonos-page { min-height: calc(100vh - 98px); display: flex; flex-direction: column; background: var(--navy2); }
    .bnd-toolbar { /* estilos toolbar */ }
    /* ... resto de CSS igual ... */
  </style>
</head>
<body>
  <!-- TODO: Incluye todo el HTML original (top-bar, nav-bar, pages: resumen, cauc, dcto, lecap, bonos) -->
  <!-- Solo resalto la página BONOS SOBERANOS con botón refresh mejorado -->
  
  <!-- PAGE BONOS SOBERANOS (idpage-bonos) - igual pero con ID en refresh -->
  <div class="page" id="page-bonos">
    <div class="bonos-page">
      <div class="bnd-toolbar">
        <div></div>
        <div class="bnd-title">BONOS SOBERANOS USD MEP</div>
        <div class="bnd-sub">Bonares Globales Bopreales Precios en dólar MEP</div>
        <div class="bnd-filters">
          <button class="bnd-ftab on" id="bf-all" onclick="bndFilter('all')">TODOS</button>
          <button class="bnd-ftab" id="bf-bonar" onclick="bndFilter('AR')">BONARES</button>
          <button class="bnd-ftab" id="bf-global" onclick="bndFilter('NY')">GLOBALES</button>
          <button class="bnd-ftab" id="bf-bopreal" onclick="bndFilter('BCRA')">BOPREALES</button>
        </div>
        <div class="bnd-spacer"></div>
        <span class="bnd-status loading" id="bnd-pill">CARGANDO...</span>
        <button class="lc-refresh-btn" id="bnd-refresh-btn" onclick="bndFetch()">ACTUALIZAR</button>
      </div>
      <div class="bnd-table-wrap">
        <table class="bnd-table" id="bnd-table">
          <thead><tr>
            <th data-col="ticker">TICKER</th>
            <th data-col="clean">CLEAN USD</th>
            <th data-col="dirty">DIRTY USD</th>
            <th data-col="var">VAR</th>
            <th data-col="tna">TNA</th>
            <th data-col="tea">TEA</th>
            <th data-col="durmod">DUR.MOD</th>
            <th data-col="paridad">PARIDAD</th>
          </tr></thead>
          <tbody id="bnd-tbody">
            <tr><td colspan="8" style="text-align:center;padding:30px;color:var(--gray);">Cargando datos...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="bnd-statusbar">
        <span id="bnd-last-upd" style="color:var(--gray);"></span>
        <span style="color:var(--blue3);">data912.com + PPI | Precios USD MEP</span>
      </div>
    </div>
  </div>
  
  <!-- Resto del HTML igual (modales, etc.) -->
  
  <script>
    // FUNCIONES GLOBALES ORIGINALES (tick, showPage, fmtN, etc.) - copia todas del original
    
    // pfetсh y sfetch ORIGINALES - mantén igual
    
    // NUEVA bndFetch CORREGIDA - PRIORIDAD DATA912 DIRECTO
    async function bndFetch() {
      const pill = document.getElementById('bnd-pill');
      const tbody = document.getElementById('bnd-tbody');
      pill.className = 'bnd-status loading';
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--gray);">Cargando datos...</td></tr>';
      
      let bonds = [];
      
      // 1. DATA912 DIRECTO (más preciso, live)
      try {
        const resp = await pfetch('https://data912.com/live/argbonds');
        bonds = Array.isArray(resp.data) ? resp.data : resp.items || resp.bonds || resp;
        console.log('data912 OK:', bonds.length, 'bonos');
      } catch (e) { 
        console.warn('data912 fail:', e);
      }
      
      // 2. FALLBACK: tu Netlify rendimientos.co
      if (bonds.length === 0) {
        try {
          const resp = await sfetch('https://rendimientos.co/.netlify/functions/soberanos');
          bonds = resp.items || resp.data || resp.bonds || [];
          console.log('Netlify fallback OK:', bonds.length);
        } catch (e) { 
          console.warn('Netlify fail:', e);
        }
      }
      
      // 3. RENDER - igual lógica original pero robusta
      tbody.innerHTML = '';
      bonds.forEach(b => {
        const ticker = (b.ticker || b.symbol || b.t || '').trim().toUpperCase();
        if (!ticker) return;
        
        const row = tbody.insertRow();
        row.innerHTML = `
          <td class="bnd-tk">${ticker}</td>
          <td>${(parseFloat(b.clean || b.price || b.cb?.ultimo || 0) || 0).toFixed(2)}</td>
          <td>${(parseFloat(b.dirty || 0) || 0).toFixed(2)}</td>
          <td class="${(b.var || b.changePct || 0) > 0 ? 'bnd-green' : 'bnd-red'}">${(b.var || b.changePct || 0).toFixed(2)}%</td>
          <td>${b.tna || 'N/A'}</td>
          <td class="bnd-green">${b.tea || 'N/A'}</td>
          <td class="bnd-cyan">${b.durmod || b.duration || 'N/A'}</td>
          <td class="bnd-amber">${b.paridad || '100%'}</td>
        `;
      });
      
      pill.className = bonds.length > 0 ? 'bnd-status ok' : 'bnd-status err';
      document.getElementById('bnd-last-upd').textContent = `Últ: ${new Date().toLocaleTimeString('es-AR', {hour: '2-digit', minute: '2-digit'})} | ${bonds.length} bonos`;
      
      // Auto-refresh cada 30s
      setTimeout(bndFetch, 30000);
    }
    
    // Llama al cargar página bonos
    function showPage(id) {
      // ... lógica original ...
      if (id === 'bonos') bndFetch(); // Auto carga
    }
    
    // Inicializa al load
    window.onload = () => {
      showPage('resumen'); // Dashboard por default
      // bndFetch(); // Opcional preload
    };
  </script>
</body>
</html>
