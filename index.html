<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Investment</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0d1b2e;
    }
    .page-part {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="resumen" class="page-part"></div>
  <div id="cauciones" class="page-part"></div>
  <div id="descuento" class="page-part"></div>
  <div id="lecap" class="page-part"></div>
  <div id="bonos" class="page-part"></div>
  <div id="arbitraje" class="page-part"></div>

  <script>
    async function loadComponent(id, file) {
      try {
        const response = await fetch(file);
        if (!response.ok) {
          throw new Error("No se pudo cargar " + file + " (" + response.status + ")");
        }
        const html = await response.text();
        document.getElementById(id).innerHTML = html;
      } catch (error) {
        console.error(error);
        document.getElementById(id).innerHTML =
          "<div style='color:white;padding:20px;font-family:Arial'>Error cargando " + file + "</div>";
      }
    }

    loadComponent("resumen", "Resumen.html");
    loadComponent("cauciones", "Cauciones.html");
    loadComponent("descuento", "Descuento.html");
    loadComponent("lecap", "Lecap.html");
    loadComponent("bonos", "Bonos.html");
    loadComponent("arbitraje", "Arbitraje.html");
  </script>
</body>
</html>
