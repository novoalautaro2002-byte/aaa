<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Investment — Calculadoras</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --navy:   #0d1b2e;
  --navy2:  #122540;
  --navy3:  #172d4d;
  --panel:  #1a3358;
  --card:   #1e3a62;
  --card2:  #243f6a;
  --border: #2a4a7a;
  --border2:#3a5a8a;
  --blue:   #3a6fd8;
  --blue2:  #5b8def;
  --blue3:  #7aa3f0;
  --blue4:  #a8c4f8;
  --accent: #4f81e8;
  --white:  #f0f4ff;
  --white2: #d0ddf5;
  --gray:   #7a99c4;
  --gray2:  #4a6a9a;
  --green:  #22d68a;
  --green2: #16a86a;
  --green-bg:#0a2a1a;
  --red:    #ff4d6a;
  --red2:   #cc3a55;
  --red-bg: #2a0a12;
  --amber:  #f0b429;
  --cyan:   #22d4f0;
  --yellow: #e8f43a;
  --font:   'Inter', sans-serif;
  --mono:   'JetBrains Mono', 'Courier New', monospace;
}

html,body{background:var(--navy);color:var(--white);font-family:var(--font);font-size:13px;min-height:100vh;overflow-x:hidden}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── TOP BAR ─── */
.top-bar{
  background:linear-gradient(135deg, var(--navy2) 0%, var(--navy3) 100%);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:56px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 16px rgba(0,0,0,.4);
}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-svg{width:40px;height:40px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text strong{font-size:16px;font-weight:800;color:var(--white);letter-spacing:-.02em}
.logo-text span{font-size:10px;font-weight:500;color:var(--blue3);letter-spacing:.08em;text-transform:uppercase}
.top-right{display:flex;align-items:center;gap:16px}
.top-badge{font-size:10px;font-weight:600;color:var(--blue4);letter-spacing:.06em;font-family:var(--mono)}
#clock{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue3);letter-spacing:.04em;
  background:var(--navy);padding:3px 8px;border:1px solid var(--border);border-radius:4px}

/* ─── NAV TABS ─── */
.nav-bar{
  background:var(--navy2);border-bottom:2px solid var(--border);
  display:flex;align-items:stretch;padding:0 20px;gap:0;
}
.nav-tab{
  display:flex;align-items:center;gap:8px;padding:0 22px;height:42px;
  font-family:var(--font);font-size:12px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--gray);border:none;background:none;
  cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;white-space:nowrap;
}
.nav-tab:hover{color:var(--blue3);background:rgba(58,111,216,.08)}
.nav-tab.active{color:var(--white);border-bottom-color:var(--blue);background:rgba(58,111,216,.12)}
.nav-tab .tab-icon{font-size:14px}
.nav-spacer{flex:1}
.nav-meta{display:flex;align-items:center;gap:8px;padding:0 4px}
.nav-meta-txt{font-size:10px;color:var(--gray2);letter-spacing:.06em;font-family:var(--mono)}

/* ─── PAGE ─── */
.page{display:none;min-height:calc(100vh - 98px)}
.page.active{display:block}

/* ─── SHELL (split layout) ─── */
.shell{display:grid;grid-template-columns:1fr 420px;min-height:calc(100vh - 98px)}
@media(max-width:980px){.shell{grid-template-columns:1fr}}
.left-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--navy2)}
.right-panel{background:var(--navy);display:flex;flex-direction:column}

/* ─── PANEL HEADER ─── */
.panel-hdr{
  background:linear-gradient(90deg,var(--navy3),var(--navy2));
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
}
.p-cmd{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue2);letter-spacing:.04em}
.p-desc{font-size:10px;color:var(--white2);letter-spacing:.06em;text-transform:uppercase}

/* ─── SELECTOR GROUP ─── */
.sel-group{padding:10px 16px 8px;border-bottom:1px solid var(--border)}
.sel-label{font-size:9px;font-weight:700;color:var(--white2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
.sel-tabs{display:flex;gap:4px;flex-wrap:wrap}
.stab{
  background:var(--navy3);border:1px solid var(--border);
  color:var(--gray);font-family:var(--font);font-size:10px;font-weight:600;
  padding:4px 12px;cursor:pointer;letter-spacing:.04em;border-radius:4px;
  transition:all .12s;height:26px;display:flex;align-items:center;
}
.stab:hover{color:var(--blue3);border-color:var(--blue2)}
.stab.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 8px rgba(58,111,216,.4)}
.stab.on-green{background:var(--green2);color:#fff;border-color:var(--green2);box-shadow:0 0 8px rgba(22,168,106,.3)}
.stab.on-amber{background:#7a5a10;color:var(--amber);border-color:var(--amber)}
.stab.on-red{background:var(--red2);color:#fff;border-color:var(--red2)}
.stab.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* ─── SECTION TITLE ─── */
.sec{
  background:rgba(58,111,216,.08);border-bottom:1px solid var(--border);border-top:1px solid var(--border);
  padding:4px 16px;font-size:9px;font-weight:700;
  color:var(--blue3);letter-spacing:.15em;text-transform:uppercase;margin-top:6px;
}

/* ─── FIELDS ─── */
.fields{padding:8px 16px;display:flex;flex-direction:column;gap:6px}
.fr{display:grid;grid-template-columns:160px 1fr;align-items:center;gap:10px;min-height:28px}
.fl2{font-size:11px;color:var(--white2);text-align:right;padding-right:10px;border-right:1px solid var(--border);line-height:28px;letter-spacing:.02em}
.fv{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.pi{
  background:var(--navy);border:1px solid var(--border2);
  color:var(--yellow);font-family:var(--mono);font-size:13px;font-weight:600;
  padding:3px 8px;outline:none;height:28px;border-radius:4px;
  transition:border-color .12s,box-shadow .12s;
}
.pi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(58,111,216,.2);background:#0a1828}
.pi::placeholder{color:var(--gray2);font-weight:400}
.pi::-webkit-inner-spin-button,.pi::-webkit-outer-spin-button{-webkit-appearance:none}
.pi[type="date"]{color-scheme:dark;font-size:11px}
.fu{font-size:10px;color:var(--white2);letter-spacing:.04em;white-space:nowrap;font-weight:500}

.plazo-quick{display:flex;flex-wrap:wrap;gap:4px}
.qbtn{
  background:var(--navy3);border:1px solid var(--border);
  color:var(--gray);font-family:var(--mono);font-size:10px;font-weight:600;
  padding:2px 8px;cursor:pointer;letter-spacing:.04em;border-radius:3px;
  transition:all .12s;height:22px;display:flex;align-items:center;
}
.qbtn:hover{color:var(--blue3);border-color:var(--blue2)}
.qbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.mode-tabs{display:flex;border-bottom:1px solid var(--border)}
.mode-tab{
  flex:1;padding:8px 0;text-align:center;
  font-family:var(--font);font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:var(--navy2);border:none;
  color:var(--gray2);cursor:pointer;transition:all .12s;
  border-bottom:2px solid transparent;
}
.mode-tab:hover:not(.on-col):not(.on-tom){color:var(--white);background:var(--navy3)}
.mode-tab.on-col{background:var(--green-bg);color:var(--green);border-bottom-color:var(--green)}
.mode-tab.on-tom{background:var(--red-bg);color:var(--red);border-bottom-color:var(--red)}

.fr-info .fv{font-size:11px;color:var(--amber);font-weight:600;font-family:var(--mono)}

.tc-fetch-btn{
  background:var(--navy3);border:1px solid var(--border2);color:var(--blue3);
  font-family:var(--mono);font-size:10px;font-weight:700;padding:0 10px;
  cursor:pointer;height:26px;border-radius:4px;transition:all .12s;
}
.tc-fetch-btn:hover{border-color:var(--blue);background:rgba(58,111,216,.15)}
.tc-status{font-size:10px;font-family:var(--mono);letter-spacing:.04em}

.tc-notice{
  background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.2);
  padding:6px 12px;font-size:10px;color:var(--amber);
  letter-spacing:.04em;margin:4px 16px;line-height:1.6;border-radius:4px;
}

/* ─── RIGHT PANEL ─── */
.res-hdr{
  background:var(--navy2);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.res-title{font-size:10px;font-weight:700;color:var(--blue3);letter-spacing:.15em;text-transform:uppercase}
.res-badge{font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:3px;border:1px solid}
.res-badge.col{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.res-badge.tom{color:var(--red);border-color:var(--red);background:var(--red-bg)}
.res-badge.seg{color:var(--blue3);border-color:var(--blue2);background:rgba(58,111,216,.1)}

.big-nums{padding:12px;display:flex;flex-direction:column;border-bottom:1px solid var(--border);flex-shrink:0}
.bnr{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.bnr:last-child{border-bottom:none}
.bk{font-size:9px;font-weight:600;color:var(--blue4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.bv{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;font-family:var(--mono)}
.bv.blue{color:var(--blue2)}.bv.green{color:var(--green)}.bv.red{color:var(--red)}.bv.amber{color:var(--amber)}.bv.cyan{color:var(--cyan)}
.bsub{font-size:9px;color:var(--blue3);margin-top:2px;font-family:var(--mono)}

.metrics-bar{background:var(--navy3);border-bottom:1px solid var(--border);display:grid;flex-shrink:0}
.mc{padding:8px 12px;border-right:1px solid var(--border)}
.mc:last-child{border-right:none}
.mk{font-size:9px;font-weight:600;color:var(--white2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.mv{font-size:14px;font-weight:700;font-family:var(--mono)}
.mv.green{color:var(--green)}.mv.red{color:var(--red)}.mv.amber{color:var(--amber)}.mv.cyan{color:var(--cyan)}
.munit{font-size:9px;color:var(--blue3);margin-left:3px}

.bk-table{flex:1;overflow-y:auto}
.bk-sec{
  background:rgba(58,111,216,.1);border-bottom:1px solid var(--border);border-top:1px solid var(--border);
  padding:3px 12px;font-size:9px;font-weight:700;
  color:var(--blue3);letter-spacing:.15em;text-transform:uppercase;margin-top:4px;
}
.bk-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 12px;border-bottom:1px solid var(--border);font-size:11px;gap:6px;
  font-family:var(--mono);
}
.bk-row:hover{background:rgba(58,111,216,.06)}
.bk-k{color:var(--white);flex:1;line-height:1.3}
.bk-rate{font-size:10px;color:var(--blue3);width:68px;text-align:right;flex-shrink:0}
.bk-v{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right;min-width:110px;color:var(--white)}
.bk-v.pos{color:var(--green)}.bk-v.neg{color:var(--red)}.bk-v.neu{color:var(--amber)}.bk-v.cost{color:var(--red)}
.bk-v.net{color:var(--green);font-size:13px;font-weight:700}
.bk-v.netneg{color:var(--red);font-size:13px;font-weight:700}
.bk-v.main{color:var(--amber);font-size:13px}
.bk-v.blue{color:var(--blue2)}
.bk-row.tr{background:rgba(58,111,216,.08);border-top:1px solid var(--border2)}
.bk-row.net-final{
  background:linear-gradient(90deg,var(--navy3),rgba(58,111,216,.15));
  border-top:2px solid var(--blue);border-bottom:2px solid var(--blue);
}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--gray2);padding:40px 20px}
.empty-cmd{font-size:28px;font-weight:800;color:var(--border);font-family:var(--mono);letter-spacing:.05em}
.empty-msg{font-size:11px;letter-spacing:.1em;text-align:center;line-height:2;color:var(--gray2)}
.cursor{display:inline-block;width:8px;height:16px;background:var(--blue);vertical-align:middle;margin-left:2px;border-radius:1px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.status-bar{
  background:var(--navy2);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 12px;font-size:10px;font-family:var(--mono);flex-shrink:0;
}
.s-ok{color:var(--green)}.s-warn{color:var(--amber)}.s-err{color:var(--red)}

.xls-btn{
  background:linear-gradient(135deg,var(--green2),#128a55);
  color:#fff;border:none;font-family:var(--mono);font-size:10px;font-weight:700;
  padding:2px 10px;cursor:pointer;border-radius:3px;height:24px;
  letter-spacing:.06em;transition:opacity .12s;display:none;
}
.xls-btn:hover{opacity:.85}

.disclaimer{padding:6px 16px;border-top:1px solid var(--border);font-size:9px;color:var(--blue3);letter-spacing:.04em;line-height:1.7;font-family:var(--mono)}
.hidden{display:none!important}
.spacer{flex:1}

/* ════════════════════════════════════════════════
   RESUMEN — REDESIGNED DASHBOARD
════════════════════════════════════════════════ */
.r-page{
  background:linear-gradient(180deg, #050e1c 0%, #0a1828 50%, #071420 100%);
  min-height:calc(100vh - 98px);
  padding:0;
}

/* Header bar */
.r-topbar{
  background:linear-gradient(90deg, rgba(10,21,37,.95), rgba(15,32,56,.9));
  border-bottom:1px solid rgba(58,111,216,.15);
  padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(10px);
}
.r-topbar-left{display:flex;align-items:center;gap:14px}
.r-topbar-title{
  font-family:var(--mono);font-size:12px;font-weight:700;
  color:var(--blue3);letter-spacing:.12em;text-transform:uppercase;
}
.r-live-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px rgba(34,214,138,.5);
  animation:livePulse 2s ease-in-out infinite;
}
.r-live-dot.off{background:var(--red);box-shadow:0 0 8px rgba(255,77,106,.4);animation:none}
.r-live-dot.loading{background:var(--amber);box-shadow:0 0 8px rgba(240,180,41,.4);animation:livePulse 1s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.r-status-label{
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.06em;
}
.r-status-label.live{color:var(--green)}
.r-status-label.loading{color:var(--amber)}
.r-status-label.err{color:var(--red)}

.r-topbar-right{display:flex;align-items:center;gap:12px}
.r-upd-text{font-family:var(--mono);font-size:10px;color:rgba(122,153,196,.5)}
.r-refresh-btn{
  background:rgba(58,111,216,.1);border:1px solid rgba(58,111,216,.25);
  color:var(--blue3);font-family:var(--mono);font-size:10px;font-weight:700;
  padding:5px 14px;cursor:pointer;border-radius:5px;
  letter-spacing:.06em;transition:all .2s;
}
.r-refresh-btn:hover{background:rgba(58,111,216,.2);border-color:var(--blue);color:var(--white)}

/* Section headers */
.r-section-hdr{
  padding:16px 24px 8px;display:flex;align-items:center;gap:10px;
}
.r-section-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.r-section-icon.fx{background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.2)}
.r-section-icon.rates{background:rgba(91,141,239,.1);border:1px solid rgba(91,141,239,.2)}
.r-section-icon.idx{background:rgba(34,214,138,.1);border:1px solid rgba(34,214,138,.2)}
.r-section-title{
  font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--white2);letter-spacing:.12em;text-transform:uppercase;
}
.r-section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(42,74,122,.4),transparent)}
.r-section-src{font-family:var(--mono);font-size:9px;color:rgba(74,106,154,.4);letter-spacing:.04em}

/* FX Cards Grid */
.r-fx-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:8px;
  padding:0 24px 16px;
}
@media(max-width:1100px){.r-fx-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.r-fx-grid{grid-template-columns:repeat(2,1fr)}}

.r-fx-card{
  background:linear-gradient(135deg, rgba(15,31,53,.9), rgba(10,24,40,.95));
  border:1px solid rgba(42,74,122,.3);
  border-radius:10px;padding:14px 16px;
  position:relative;overflow:hidden;
  transition:all .2s;cursor:default;
}
.r-fx-card:hover{
  border-color:rgba(58,111,216,.4);
  background:linear-gradient(135deg, rgba(18,37,64,.95), rgba(13,27,46,.98));
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.r-fx-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  border-radius:10px 10px 0 0;
}
.r-fx-card.c-blue::before{background:linear-gradient(90deg,#3a6fd8,rgba(58,111,216,.2))}
.r-fx-card.c-cyan::before{background:linear-gradient(90deg,#22d4f0,rgba(34,212,240,.2))}
.r-fx-card.c-amber::before{background:linear-gradient(90deg,#f0b429,rgba(240,180,41,.2))}
.r-fx-card.c-orange::before{background:linear-gradient(90deg,#e8841a,rgba(232,132,26,.2))}
.r-fx-card.c-green::before{background:linear-gradient(90deg,#22d68a,rgba(34,214,138,.2))}
.r-fx-card.c-red::before{background:linear-gradient(90deg,#ff4d6a,rgba(255,77,106,.2))}
.r-fx-card.c-purple::before{background:linear-gradient(90deg,#a07aef,rgba(160,122,239,.2))}

.r-fx-label{
  font-family:var(--mono);font-size:9px;font-weight:700;
  color:rgba(122,153,196,.5);letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:8px;
}
.r-fx-value{
  font-family:var(--mono);font-size:22px;font-weight:800;
  color:var(--white);line-height:1;letter-spacing:-.02em;
  margin-bottom:6px;
  transition:color .3s;
}
.r-fx-value.blank{color:rgba(30,48,80,.6);font-size:18px}
.r-fx-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.r-fx-chg{
  font-family:var(--mono);font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:4px;letter-spacing:.04em;
}
.r-fx-chg.up{color:#22d68a;background:rgba(34,214,138,.1);border:1px solid rgba(34,214,138,.15)}
.r-fx-chg.dn{color:#ff5566;background:rgba(255,85,102,.08);border:1px solid rgba(255,85,102,.12)}
.r-fx-chg.neu{color:rgba(74,106,154,.5);background:rgba(42,64,96,.15);border:1px solid rgba(42,74,122,.2)}
.r-fx-sub{font-family:var(--mono);font-size:9px;color:rgba(74,106,154,.35);letter-spacing:.04em}
.r-fx-sparkline{position:absolute;bottom:0;right:0;width:80px;height:32px;opacity:.25}

/* 2-col grid for rates + indices */
.r-dual-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:0 24px 20px;
}
@media(max-width:900px){.r-dual-grid{grid-template-columns:1fr}}

.r-panel-card{
  background:linear-gradient(135deg, rgba(15,31,53,.85), rgba(10,24,40,.9));
  border:1px solid rgba(42,74,122,.25);
  border-radius:10px;overflow:hidden;
}
.r-panel-hdr{
  background:rgba(6,15,28,.6);
  border-bottom:1px solid rgba(42,74,122,.2);
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;
}
.r-panel-hdr-icon{font-size:14px}
.r-panel-hdr-text{
  font-family:var(--mono);font-size:10px;font-weight:700;
  color:var(--blue3);letter-spacing:.1em;text-transform:uppercase;
}

/* Rate rows */
.r-rate-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;
  border-bottom:1px solid rgba(42,74,122,.12);
  transition:background .15s;
}
.r-rate-row:last-child{border-bottom:none}
.r-rate-row:hover{background:rgba(58,111,216,.04)}
.r-rate-left{display:flex;flex-direction:column;gap:2px}
.r-rate-name{font-size:12px;font-weight:600;color:var(--white2);letter-spacing:.02em}
.r-rate-sub{font-family:var(--mono);font-size:9px;color:rgba(74,106,154,.4);letter-spacing:.04em}
.r-rate-val{
  font-family:var(--mono);font-size:18px;font-weight:800;
  color:var(--amber);letter-spacing:-.02em;
  transition:color .3s;
}
.r-rate-val.blue{color:var(--blue2)}
.r-rate-val.green{color:var(--green)}
.r-rate-val.blank{color:rgba(30,48,80,.5)}

/* Merval hero */
.r-merval-hero{
  background:linear-gradient(135deg, rgba(10,22,48,.9), rgba(8,18,31,.95));
  padding:18px 16px;
  border-bottom:1px solid rgba(42,74,122,.15);
  position:relative;overflow:hidden;
}
.r-merval-hero::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue2),var(--cyan),transparent);
}
.r-merval-lbl2{
  font-family:var(--mono);font-size:9px;font-weight:700;
  color:rgba(122,163,240,.4);letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:8px;
}
.r-merval-val2{
  font-family:var(--mono);font-size:34px;font-weight:900;
  color:#fff;letter-spacing:-.03em;line-height:1;
}
.r-merval-val2.blank{color:rgba(30,48,80,.4)}
.r-merval-chg2{
  font-family:var(--mono);font-size:14px;font-weight:700;margin-top:6px;
}
.r-merval-chg2.up{color:var(--green)}
.r-merval-chg2.dn{color:var(--red)}
.r-merval-chg2.neu{color:rgba(74,106,154,.4)}

/* Index rows */
.r-idx-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;
  border-bottom:1px solid rgba(42,74,122,.12);
  transition:background .15s;
}
.r-idx-row:last-child{border-bottom:none}
.r-idx-row:hover{background:rgba(58,111,216,.04)}
.r-idx-left2{display:flex;flex-direction:column;gap:1px}
.r-idx-name2{font-size:12px;font-weight:700;color:var(--white2);letter-spacing:.02em}
.r-idx-sub2{font-family:var(--mono);font-size:9px;color:rgba(74,106,154,.35);letter-spacing:.04em}
.r-idx-right2{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.r-idx-val2{font-family:var(--mono);font-size:15px;font-weight:800;color:#d0e0ff;letter-spacing:-.02em}
.r-idx-val2.blank{color:rgba(30,48,80,.4)}
.r-idx-chg2{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px}
.r-idx-chg2.up{color:#22d68a;background:rgba(34,214,138,.08)}
.r-idx-chg2.dn{color:#ff5566;background:rgba(255,85,102,.06)}
.r-idx-chg2.neu{color:rgba(74,106,154,.4)}

/* Footer status */
.r-footer{
  background:rgba(6,15,28,.5);
  border-top:1px solid rgba(42,74,122,.15);
  padding:8px 24px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--mono);font-size:9px;
  color:rgba(74,106,154,.35);
}

/* Shimmer loading */
.r-shimmer{
  background:linear-gradient(90deg, rgba(42,74,122,.15) 25%, rgba(58,111,216,.12) 50%, rgba(42,74,122,.15) 75%);
  background-size:200% 100%;
  animation:rShimmer 1.5s infinite;
  border-radius:4px;
}
@keyframes rShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Bond strip */
.r-bond-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:0 24px 16px;
}
@media(max-width:900px){.r-bond-strip{grid-template-columns:repeat(2,1fr)}}
.r-bond-card{
  background:linear-gradient(135deg, rgba(15,31,53,.9), rgba(10,24,40,.95));
  border:1px solid rgba(42,74,122,.3);
  border-radius:10px;padding:14px 16px;
  position:relative;overflow:hidden;
  transition:all .2s;
}
.r-bond-card:hover{
  border-color:rgba(91,141,239,.35);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(0,0,0,.25);
}
.r-bond-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue2),rgba(91,141,239,.2));
}
.r-canje-card::before{
  background:linear-gradient(90deg,#a07aef,rgba(160,122,239,.2));
}
.r-bond-ticker{
  font-family:var(--mono);font-size:13px;font-weight:800;
  color:var(--white);letter-spacing:.04em;
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.r-bond-badge{
  font-size:8px;font-weight:700;letter-spacing:.08em;
  padding:2px 6px;border-radius:3px;border:1px solid;
}
.r-bond-badge.pesos{color:var(--amber);border-color:rgba(240,180,41,.3);background:rgba(240,180,41,.08)}
.r-bond-badge.dolar{color:var(--green);border-color:rgba(34,214,138,.3);background:rgba(34,214,138,.08)}
.r-bond-badge.cable{color:var(--cyan);border-color:rgba(34,212,240,.3);background:rgba(34,212,240,.08)}
.r-bond-badge.canje{color:#a07aef;border-color:rgba(160,122,239,.3);background:rgba(160,122,239,.08)}
.r-bond-price{
  font-family:var(--mono);font-size:22px;font-weight:800;
  color:var(--white);line-height:1;letter-spacing:-.02em;
  margin-bottom:6px;transition:color .3s;
}
.r-bond-price.blank{color:rgba(30,48,80,.6);font-size:18px}

/* Animate number in */
@keyframes fadeNumIn{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}
.r-num-in{animation:fadeNumIn .3s ease-out}

/* ════════════════════════════════════════
   LECAP PAGE (unchanged)
════════════════════════════════════════ */
.lecap-page{min-height:calc(100vh - 98px);display:flex;flex-direction:column;background:var(--navy2)}
.lc-toolbar{
  background:linear-gradient(90deg,var(--navy3),var(--navy2));
  border-bottom:1px solid var(--border);
  padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.lc-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue2);letter-spacing:.06em}
.lc-sub{font-size:10px;color:var(--gray);letter-spacing:.08em;text-transform:uppercase}
.lc-spacer{flex:1}
.lc-refresh-btn{
  background:var(--navy3);border:1px solid var(--border2);color:var(--blue3);
  font-family:var(--mono);font-size:10px;font-weight:700;padding:0 12px;
  cursor:pointer;height:28px;border-radius:4px;letter-spacing:.06em;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.lc-refresh-btn:hover{border-color:var(--blue);background:rgba(58,111,216,.15);color:var(--white)}
.lc-refresh-btn.loading{opacity:.6;pointer-events:none}
.lc-status-pill{
  font-size:10px;font-family:var(--mono);padding:2px 10px;border-radius:10px;
  border:1px solid;letter-spacing:.06em;font-weight:600;
}
.lc-status-pill.ok{color:var(--green);border-color:var(--green2);background:var(--green-bg)}
.lc-status-pill.loading{color:var(--amber);border-color:#7a5a10;background:rgba(120,80,10,.2);animation:pillblink 1s step-end infinite}
.lc-status-pill.err{color:var(--red);border-color:var(--red2);background:var(--red-bg)}
@keyframes pillblink{0%,100%{opacity:1}50%{opacity:.4}}
.lc-settle{font-size:10px;color:var(--gray);font-family:var(--mono)}
.lc-filters{display:flex;gap:4px}
.lc-ftab{
  background:var(--navy3);border:1px solid var(--border);color:var(--gray);
  font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 10px;
  cursor:pointer;letter-spacing:.06em;border-radius:3px;height:26px;
  display:flex;align-items:center;transition:all .12s;
}
.lc-ftab:hover{color:var(--white);border-color:var(--blue2)}
.lc-ftab.on{background:rgba(58,111,216,.2);color:var(--blue2);border-color:var(--blue)}
.lc-ftab.on-green{background:rgba(22,168,106,.15);color:var(--green);border-color:var(--green2)}
.lc-ftab.on-amber{background:rgba(120,80,10,.2);color:var(--amber);border-color:var(--amber)}
.lc-table-wrap{flex:1;overflow:auto}
.lc-table{width:100%;border-collapse:collapse;font-family:var(--mono)}
.lc-table thead tr{background:#0a1525;border-bottom:2px solid var(--border)}
.lc-table thead th{
  padding:8px 14px;font-size:10px;font-weight:700;
  color:#f0b429;letter-spacing:.12em;text-transform:uppercase;
  text-align:right;white-space:nowrap;border-right:1px solid rgba(42,74,122,.4);
  cursor:pointer;user-select:none;transition:color .12s;position:sticky;top:0;
  background:#0a1525;z-index:2;
}
.lc-table thead th:first-child{text-align:left}
.lc-table thead th:last-child{border-right:none}
.lc-table thead th:hover{color:var(--white)}
.lc-table thead th .sort-arrow{opacity:.4;margin-left:4px;font-size:9px}
.lc-table thead th.sort-asc .sort-arrow::after{content:'▲';opacity:1}
.lc-table thead th.sort-desc .sort-arrow::after{content:'▼';opacity:1}
.lc-table thead th:not(.sort-asc):not(.sort-desc) .sort-arrow::after{content:'⇅'}
.lc-table tbody tr{
  border-bottom:1px solid rgba(42,74,122,.4);cursor:pointer;transition:background .1s;
}
.lc-table tbody tr:hover{background:rgba(58,111,216,.12)}
.lc-table tbody tr:nth-child(even){background:rgba(10,21,37,.4)}
.lc-table tbody tr:nth-child(even):hover{background:rgba(58,111,216,.12)}
.lc-table tbody td{
  padding:7px 14px;font-size:12px;text-align:right;
  color:var(--white2);border-right:1px solid rgba(42,74,122,.25);white-space:nowrap;
}
.lc-table tbody td:first-child{text-align:left}
.lc-table tbody td:last-child{border-right:none}
.lc-ticker-wrap{display:flex;align-items:center;gap:8px}
.lc-ticker{font-weight:700;font-size:13px;color:var(--white);letter-spacing:.04em}
.lc-badge{font-size:8px;font-weight:700;letter-spacing:.08em;padding:1px 5px;border-radius:2px;border:1px solid;text-transform:uppercase}
.lc-badge.lecap{color:#22d4f0;border-color:#1a9ab0;background:rgba(34,212,240,.08)}
.lc-badge.boncap{color:var(--amber);border-color:#8a6820;background:rgba(240,180,41,.08)}
.lc-price{color:var(--white);font-weight:600}
.lc-pago{color:var(--cyan);font-weight:600}
.lc-dias{color:var(--white2)}
.lc-venc{color:var(--blue3)}
.lc-tna{color:var(--white2)}
.lc-tem{color:var(--white2)}
.lc-tir{color:var(--green);font-weight:700;font-size:13px}
.lc-skel td{opacity:.4}
.lc-skel-bar{height:12px;background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%);
  border-radius:2px;animation:shimmer 1.4s infinite;background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.lc-statusbar{
  background:var(--navy3);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 16px;font-size:10px;font-family:var(--mono);
}
.lc-table-panel{display:block}
.lc-curves-panel{display:flex;flex-direction:column;background:var(--navy2);border-top:2px solid var(--border2)}
.lc-curve-controls{
  background:var(--navy2);border-bottom:1px solid var(--border);
  padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.lc-curve-metric-tabs{display:flex;gap:4px}
.lc-cmtab{
  background:var(--navy3);border:1px solid var(--border);color:var(--gray);
  font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 12px;
  cursor:pointer;letter-spacing:.06em;border-radius:3px;height:26px;
  display:flex;align-items:center;transition:all .12s;
}
.lc-cmtab:hover{color:var(--white);border-color:var(--blue2)}
.lc-cmtab.on-tir{background:rgba(34,214,138,.15);color:var(--green);border-color:var(--green2)}
.lc-cmtab.on-tna{background:rgba(91,141,239,.15);color:var(--blue2);border-color:var(--blue2)}
.lc-cmtab.on-tem{background:rgba(34,212,240,.15);color:var(--cyan);border-color:var(--cyan)}
.lc-curve-legend{display:flex;align-items:center;gap:14px;margin-left:auto}
.lc-leg-item{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--mono);color:var(--white2)}
.lc-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lc-leg-dot.lecap{background:#22d4f0}
.lc-leg-dot.boncap{background:#f0b429}
.lc-chart-outer{display:flex;justify-content:center;align-items:flex-start;padding:24px 20px 16px;background:var(--navy)}
.lc-chart-box{
  width:55%;min-width:480px;max-width:860px;
  background:#08121f;border:1px solid var(--border);border-radius:6px;
  padding:20px 20px 14px;position:relative;
}
.lc-chart-box canvas{display:block}
.lc-curve-stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);background:var(--navy2);flex-shrink:0}
.lc-cstat{padding:10px 18px;border-right:1px solid var(--border)}
.lc-cstat:last-child{border-right:none}
.lc-cstat-k{font-size:9px;font-weight:700;color:var(--white2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.lc-cstat-v{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--white)}
.lc-cstat-sub{font-size:10px;color:var(--gray);margin-top:1px;font-family:var(--mono)}

/* LECAP MODAL */
.lc-modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,10,20,.82);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.lc-modal-overlay.open{display:flex}
.lc-modal{background:#0f1f35;border:1px solid var(--border2);border-radius:6px;width:620px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(58,111,216,.2);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.lc-modal-hdr{background:linear-gradient(90deg,#0a1a2e,#102030);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between}
.lc-modal-title{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--white);letter-spacing:.04em}
.lc-modal-sub{font-size:11px;color:var(--gray);margin-top:3px;font-family:var(--mono)}
.lc-modal-close{background:none;border:none;color:var(--gray);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;transition:color .12s}
.lc-modal-close:hover{color:var(--white)}
.lc-modal-body{padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1}
.lc-calc-top{display:grid;grid-template-columns:120px 160px 1fr;gap:10px;align-items:end}
.lc-calc-field{display:flex;flex-direction:column;gap:4px}
.lc-calc-lbl{font-size:9px;font-weight:700;color:var(--white2);letter-spacing:.14em;text-transform:uppercase}
.lc-calc-inp{background:#060f1c;border:1px solid var(--border2);color:var(--yellow);font-family:var(--mono);font-size:16px;font-weight:700;padding:6px 10px;outline:none;height:36px;border-radius:4px;width:100%;transition:border-color .12s,box-shadow .12s}
.lc-calc-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(58,111,216,.2);background:#030a14}
.lc-calc-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.lc-metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.lc-met{background:#0a1828;padding:6px 10px}
.lc-met-k{font-size:8px;font-weight:700;color:var(--white2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.lc-met-v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--white)}
.lc-met-v.tna{color:var(--white2)}.lc-met-v.tem{color:var(--white2)}.lc-met-v.tir{color:var(--green);font-size:15px}.lc-met-v.dias{color:var(--blue3)}
.lc-costs-row{display:flex;align-items:center;gap:10px;background:#060f1c;border:1px solid var(--border);border-radius:4px;padding:8px 12px}
.lc-costs-lbl{font-size:10px;color:var(--gray);font-weight:600;letter-spacing:.08em;white-space:nowrap}
.lc-cost-field{display:flex;align-items:center;gap:6px}
.lc-cost-name{font-size:10px;color:var(--white2);letter-spacing:.04em;white-space:nowrap}
.lc-cost-inp{background:#0a1828;border:1px solid var(--border);color:var(--yellow);font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;outline:none;height:26px;border-radius:3px;width:70px;transition:border-color .12s}
.lc-cost-inp:focus{border-color:var(--blue)}
.lc-cost-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.lc-cost-unit{font-size:10px;color:var(--gray2)}
.lc-tir-obj{background:rgba(58,111,216,.1);border:1px solid rgba(58,111,216,.3);border-radius:4px;padding:10px 14px}
.lc-tir-obj-row{display:flex;align-items:center;gap:12px}
.lc-tir-obj-lbl{font-size:11px;font-weight:700;color:var(--blue2);letter-spacing:.06em;white-space:nowrap}
.lc-tir-obj-inp{background:#060f1c;border:1px solid var(--border2);color:var(--yellow);font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 10px;outline:none;height:30px;border-radius:4px;width:100px;transition:border-color .12s}
.lc-tir-obj-inp:focus{border-color:var(--blue)}
.lc-tir-obj-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.lc-tir-obj-hint{font-size:11px;color:var(--gray);font-family:var(--mono)}
.lc-tir-obj-result{font-size:11px;color:var(--amber);font-family:var(--mono);font-weight:600}
.lc-summary{background:#060f1c;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.lc-sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px}
.lc-sum-row:last-child{border-bottom:none}
.lc-sum-k{color:var(--white2)}.lc-sum-v{font-weight:600;color:var(--white)}
.lc-sum-row.profit .lc-sum-k{color:var(--green);font-weight:700;font-size:13px}
.lc-sum-row.profit .lc-sum-v{color:var(--green);font-weight:700;font-size:13px}
/* ════════════════ BONOS SOBERANOS ════════════════ */
.bonos-page{min-height:calc(100vh - 98px);display:flex;flex-direction:column;background:var(--navy2)}
.bnd-toolbar{background:linear-gradient(90deg,var(--navy3),var(--navy2));border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bnd-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue2);letter-spacing:.06em}
.bnd-sub{font-size:10px;color:var(--gray);letter-spacing:.08em;text-transform:uppercase}
.bnd-spacer{flex:1}
.bnd-filters{display:flex;gap:4px}
.bnd-ftab{background:var(--navy3);border:1px solid var(--border);color:var(--gray);font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 10px;cursor:pointer;letter-spacing:.06em;border-radius:3px;height:26px;display:flex;align-items:center;transition:all .12s}
.bnd-ftab:hover{color:var(--white);border-color:var(--blue2)}
.bnd-ftab.on{background:rgba(58,111,216,.2);color:var(--blue2);border-color:var(--blue)}
.bnd-ftab.on-green{background:rgba(22,168,106,.15);color:var(--green);border-color:var(--green2)}
.bnd-ftab.on-amber{background:rgba(120,80,10,.2);color:var(--amber);border-color:var(--amber)}

const dfN=n=>Math.round(Number(n)).toLocaleString('es-AR');

// Fetch with CORS proxy fallback chain (for data912 etc.)
async function pfetch(url){
  try{const r=await fetch(url);if(r.ok)return r.json();}catch(e){}
  try{
    const r2=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
    if(!r2.ok)throw new Error('proxy HTTP '+r2.status);
    const d=await r2.json();return JSON.parse(d.contents);
  }catch(e){}
  try{
    const r3=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));
    if(r3.ok)return r3.json();
  }catch(e){}
  throw new Error('unreachable: '+url);
}

// Simple fetch — for APIs with native CORS headers (dolarapi)
async function sfetch(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

function rSetVal(id,txt){
  const e=document.getElementById(id);if(!e)return;
  e.textContent=txt;e.classList.remove('blank');e.classList.add('r-num-in');
  setTimeout(()=>e.classList.remove('r-num-in'),300);
}
function rSetChg(id,pct,label){
  const e=document.getElementById(id);if(!e)return;
  const cls=pct>0.05?'up':pct<-0.05?'dn':'neu';
  e.className=e.className.replace(/\b(up|dn|neu)\b/g,'').trim()+' '+cls;
  e.textContent=label!=null?label:(pct>=0?'+':'')+pct.toFixed(2)+'%';
}

let _dashTimer=null;

async function dashFetch(){
  const dot=$$('r-dot'),lbl=$$('r-status-lbl');
  dot.className='r-live-dot loading';
  lbl.className='r-status-label loading';lbl.textContent='ACTUALIZANDO...';
  $$('r-upd-text').textContent='cargando...';

  let ok=0;

  // All calls in parallel — fuentes primarias: dolarapi.com + data912.com + Yahoo Finance
  // 1. dolarapi.com (direct, has CORS) — FX
  // 2. dolarapi.com/v1/dolares/oficial (direct) — BNA
  // 3. data912.com/live/merval via pfetch — Merval index
  // 4. data912.com/live/arg_bonds via pfetch — AL30 / bonos soberanos
  const [rDolar, rBnaOficial, rMerval, rBondsD912] =
    await Promise.allSettled([
      sfetch('https://dolarapi.com/v1/dolares'),
      sfetch('https://dolarapi.com/v1/dolares/oficial'),
      pfetch('https://data912.com/live/merval'),
      pfetch('https://data912.com/live/arg_bonds'),
    ]);

  // -- DOLAR (dolarapi.com) --
  if(rDolar.status==='fulfilled'){
    try{
      const by={};
      rDolar.value.forEach(d=>{by[(d.casa||'').toLowerCase()]=d;});
      const v=d=>d?parseFloat(d.venta||d.compra||0):0;
      const vCCL=v(by['contadoconliqui']||by['cable']||by['contado con liquidacion']);
      const vMEP=v(by['bolsa']||by['mep']);
      const vMayo=v(by['mayorista']);
      const vBlu=v(by['blue']);
      if(vCCL>0){rSetVal('r-ccl','$'+df(vCCL));rSetChg('r-ccl-chg',0,'Cable');}
      if(vMEP>0){rSetVal('r-mep','$'+df(vMEP));rSetChg('r-mep-chg',0,'Bolsa');}
      if(vMayo>0){rSetVal('r-bcra','$'+df(vMayo));rSetChg('r-bcra-chg',0,'BCRA');}
      if(vBlu>0){rSetVal('r-blue','$'+df(vBlu));rSetChg('r-blue-chg',0,'Blue');}
      if(vCCL>0&&vMayo>0){
        const br=((vCCL/vMayo)-1)*100;
        rSetVal('r-brecha',br.toFixed(1)+'%');
        rSetChg('r-brecha-chg',br);
      }
      $$('r-fx-src').textContent='dolarapi.com '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
      ok++;
    }catch(e){console.warn('dolar parse:',e);}
  }

  // -- BNA (dolarapi.com/v1/dolares/oficial) --
  if(rBnaOficial.status==='fulfilled'){
    try{
      const d=rBnaOficial.value;
      const vBNA=parseFloat(d.venta||d.compra||0);
      if(vBNA>0){rSetVal('r-bna','$'+df(vBNA));rSetChg('r-bna-chg',0,'BNA');ok++;}
    }catch(e){console.warn('bna parse:',e);}
  }

  // -- MUNDO (Yahoo Finance directo via pfetch) --
  // -- MUNDO (Yahoo Finance directo via pfetch) --
  try{
    const yFetch=async(sym)=>{
      const d=await pfetch('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=2d');
      const meta=d?.chart?.result?.[0]?.meta;if(!meta)return null;
      const price=meta.regularMarketPrice,prev=meta.chartPreviousClose||meta.previousClose;
      return{price,pct:prev>0?((price-prev)/prev)*100:0};
    };
    const [fSPY,fQQQ,fGLD,fBTC,fWTI,fBrent]=await Promise.allSettled([
      yFetch('ES=F'),yFetch('NQ=F'),yFetch('GC=F'),yFetch('BTC-USD'),yFetch('CL=F'),yFetch('BZ=F')
    ]);
    const ySet=(r,vid,cid,fmt)=>{if(r.status==='fulfilled'&&r.value){rSetVal(vid,fmt(r.value.price));rSetChg(cid,r.value.pct);ok++;}};
    ySet(fSPY,'r-spy-val','r-spy-chg',v=>'u$s'+df(v));
    ySet(fQQQ,'r-qqq-val','r-qqq-chg',v=>'u$s'+df(v));
    ySet(fGLD,'r-gold-val','r-gold-chg',v=>'u$s'+df(v));
    ySet(fBTC,'r-btc-val','r-btc-chg',v=>'u$s'+dfK(v));
    ySet(fWTI,'r-wti-val','r-wti-chg',v=>'u$s'+df(v));
    ySet(fBrent,'r-brent-val','r-brent-chg',v=>'u$s'+df(v));
  }catch(e){console.warn('yahoo mundo:',e);}

  // -- SOBERANOS AL30 (data912.com/live/arg_bonds — fuente única) --
  const extractBond=(arr,tk)=>{
    if(!Array.isArray(arr))return null;
    for(const b of arr){
      const t=(b.ticker||b.symbol||b.t||'').trim().toUpperCase();
      if(t!==tk)continue;
      const v=parseFloat(b.price||b.c||b.ultimo||b.last||0);
      const p=parseFloat(b.changePct||b.pct_change||b.variacion_pct||b.var||0);
      return v>0?{price:v,pct:p}:null;
    }
    return null;
  };

  let bondArr=[];
  if(rBondsD912.status==='fulfilled'){
    try{
      const raw=rBondsD912.value;
      bondArr=Array.isArray(raw)?raw:(raw.data||raw.items||[]);
    }catch(e){}
  }

  const al30=extractBond(bondArr,'AL30');
  const al30d=extractBond(bondArr,'AL30D');
  const al30c=extractBond(bondArr,'AL30C');
  if(al30){rSetVal('r-al30-val','$'+df(al30.price));rSetChg('r-al30-chg',al30.pct);ok++;}
  if(al30d){rSetVal('r-al30d-val','u$s'+df(al30d.price));rSetChg('r-al30d-chg',al30d.pct);ok++;}
  if(al30c){rSetVal('r-al30c-val','u$s'+df(al30c.price));rSetChg('r-al30c-chg',al30c.pct);}
  // Canje = (AL30D / AL30C - 1) * 100
  if(al30d&&al30c&&al30c.price>0){
    const canje=(al30d.price/al30c.price-1)*100;
    rSetVal('r-canje-val',canje.toFixed(2)+'%');
    rSetChg('r-canje-chg',canje);
  }
  const bSrc='data912.com';
  $$('r-bond-src').textContent=bSrc+' '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

  // -- MERVAL (data912.com/live/merval) --
  if(rMerval.status==='fulfilled'){
    try{
      const arr=Array.isArray(rMerval.value)?rMerval.value:[rMerval.value];
      const it=arr[0];
      if(it){
        const v=parseFloat(it.c||it.valor||it.last||0),p=parseFloat(it.pct_change||it.variacion_pct||0);
        if(v>0){
          rSetVal('r-merval-val',dfN(v));
          const e=$$('r-merval-chg');
          if(e){e.className='r-merval-chg2 '+(p>0?'up':p<0?'dn':'neu');e.textContent=(p>=0?'+':'')+p.toFixed(2)+'%';}
          ok++;
        }
      }
    }catch(e){console.warn('merval parse:',e);}
  }

  // -- STATUS --
  const now=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(ok>0){
    dot.className='r-live-dot';
    lbl.className='r-status-label live';lbl.textContent='LIVE';
  }else{
    dot.className='r-live-dot off';
    lbl.className='r-status-label err';lbl.textContent='SIN DATOS';
  }

  // Auto-refresh 15s
  clearInterval(_dashTimer);
  let cd=15;
  $$('r-upd-text').textContent=now+' prox. '+cd+'s';
  _dashTimer=setInterval(()=>{
    cd--;
    $$('r-upd-text').textContent=now+' prox. '+cd+'s';
    if(cd<=0){clearInterval(_dashTimer);dashFetch();}
  },1000);
}

function lcComputeYields(price,pagoFinal,days){if(!price||price<=0||!pagoFinal||days<=0)return{tna:0,tem:0,tir:0};const ratio=pagoFinal/price,tna=(ratio-1)*(360/days)*100,tir=(Math.pow(ratio,360/days)-1)*100,tem=(Math.pow(1+tir/100,1/12)-1)*100;return{tna,tem,tir};}

function lcNormalizeD912(arr){if(!Array.isArray(arr))return[];const results=[];for(const item of arr){const ticker=(item.ticker||item.symbol||item.t||'').replace(/\s/g,'');if(!ticker)continue;const cfg=LC_CONFIG[ticker];if(!cfg)continue;const price=parseFloat(item.c||item.ultimo||item.last||item.price||0);if(!price||price<=0)continue;results.push({ticker,type:cfg.type,price,pagoFinal:cfg.pagoFinal,maturity:cfg.maturity});}return results;}

// Normalize response from Netlify function (already {ticker,price,varPct})
function lcNormalizeNetlify(arr){
  if(!Array.isArray(arr))return[];
  const results=[];
  for(const item of arr){
    const ticker=(item.ticker||'').replace(/\s/g,'').toUpperCase();
    if(!ticker)continue;
    const cfg=LC_CONFIG[ticker];
    if(!cfg)continue;
    const price=parseFloat(item.price||0);
    if(!price||price<=0)continue;
    results.push({ticker,type:cfg.type,price,pagoFinal:cfg.pagoFinal,maturity:cfg.maturity});
  }
  return results;
}

  try{
    const r=await fetch('/.netlify/functions/lecaps');

      const json=await r.json();
      if(json.data&&json.data.length>0){
        const normalized=lcNormalizeNetlify(json.data);

          newData=normalized;

  // ── Estrategia 2: data912 directo ────────────────────────────────────────
  if(!fetched){
    try{
      const[rawNotes,rawBonds]=await Promise.all([
        lcFetchUrl('https://data912.com/live/arg_notes').catch(()=>null),
        lcFetchUrl('https://data912.com/live/arg_bonds').catch(()=>null),
      ]);
      const notesArr=rawNotes?(Array.isArray(rawNotes)?rawNotes:(rawNotes.data||[])):[];

      _rawBondData=bondsArr;
      const notes=lcNormalizeD912(notesArr),bonds=lcNormalizeD912(bondsArr);

        lcFetchUrl('https://api.allorigins.win/get?url='+encodeURIComponent('https://data912.com/live/arg_bonds')).catch(()=>null),
      ]);
      const notesArr=resN?JSON.parse(resN.contents||'[]'):[];
      const bondsArr=resB?JSON.parse(resB.contents||'[]'):[];
      _rawBondData=bondsArr;
      const notes=lcNormalizeD912(notesArr),bonds=lcNormalizeD912(bondsArr);
      newData=[...notes,...bonds];apiSource='data912 (proxy)';
      if(newData.length>0)fetched=true;else errMsg='Sin instrumentos (proxy)';
    }catch(e){errMsg=e.message||'Error de red';}
  }

  if(!fetched){
    if(lcData.length===0){newData=Object.entries(LC_CONFIG).map(([ticker,cfg])=>({ticker,type:cfg.type,price:LC_STATIC_PRICES[ticker]||100,pagoFinal:cfg.pagoFinal,maturity:cfg.maturity}));}
    else{newData=lcData.map(b=>({ticker:b.ticker,type:b.type,price:b.price,pagoFinal:b.pagoFinal,maturity:b.maturity}));}
    pill.className='lc-status-pill err';pill.textContent='⚠ OFFLINE';
    $$('lc-last-update').textContent='⚠ '+errMsg+' · datos de referencia · '+new Date().toLocaleTimeString('es-AR');
  }else{
    pill.className='lc-status-pill ok';pill.textContent='LIVE ●';
    $$('lc-last-update').innerHTML='✓ '+new Date().toLocaleTimeString('es-AR')+' · '+newData.length+' instrumentos · <span style="color:var(--blue3);font-size:10px">'+apiSource+'</span> · próx. upd. <span id="lc-cd">15</span>s';
  }
  lcData=newData.map(b=>({...b,days:lcDaysTo(b.maturity),...lcComputeYields(b.price,b.pagoFinal,lcDaysTo(b.maturity))}));
  btn.classList.remove('loading');btn.textContent='↻ ACTUALIZAR';lcRender();lcRenderCurve();lcStartCountdown();
}

// DurM [360]: MacD = días/360, ModD = MacD / (1 + TIR/100) — convención Act/360 pura
function lcModDuration(days,tir){return(days/360)/(1+tir/100);}
function polyFit2(pts){const n=pts.length;if(n<3)return x=>pts[0]?.y??0;let s0=0,s1=0,s2=0,s3=0,s4=0,t0=0,t1=0,t2=0;for(const{x,y}of pts){s0++;s1+=x;s2+=x*x;s3+=x*x*x;s4+=x*x*x*x;t0+=y;t1+=x*y;t2+=x*x*y;}const A=[[s4,s3,s2,t2],[s3,s2,s1,t1],[s2,s1,s0,t0]];for(let i=0;i<3;i++){let mx=i;for(let j=i+1;j<3;j++)if(Math.abs(A[j][i])>Math.abs(A[mx][i]))mx=j;[A[i],A[mx]]=[A[mx],A[i]];for(let j=i+1;j<3;j++){const f=A[j][i]/A[i][i];for(let k=i;k<=3;k++)A[j][k]-=f*A[i][k];}}const c=[0,0,0];for(let i=2;i>=0;i--){c[i]=A[i][3];for(let j=i+1;j<3;j++)c[i]-=A[i][j]*c[j];c[i]/=A[i][i];}return x=>c[0]*x*x+c[1]*x+c[2];}
function lcSetCurveMetric(m){lcCurveMetric=m;['tir','tna','tem'].forEach(k=>{$$('lc-cm-'+k).className='lc-cmtab'+(k===m?' on-'+k:'');});$$('lc-st-min-k').textContent={tir:'TIR',tna:'TNA',tem:'TEM'}[m]+' mín.';$$('lc-st-max-k').textContent={tir:'TIR',tna:'TNA',tem:'TEM'}[m]+' máx.';lcRenderCurve();}
function lcRenderCurve(){
  if(!lcData.length)return;
  const metricLine={tir:'#22d68a',tna:'#5b8def',tem:'#22d4f0'};
  const metricLabelStr={tir:'TIR (TEA %)',tna:'TNA %',tem:'TEM %'};
  const lineColor=metricLine[lcCurveMetric];
  const metricLabel=metricLabelStr[lcCurveMetric];

  // Build points sorted by DM
  const pts=[...lcData]
    .filter(b=>lcFilter==='all'||b.type.toLowerCase()===lcFilter)
    .map(b=>({...b,dm:lcModDuration(b.days,b.tir)}))
    .sort((a,b)=>a.dm-b.dm);
  if(!pts.length)return;

  const regPts=pts.map(b=>({x:b.dm,y:b[lcCurveMetric]}));
  const f=polyFit2(regPts);
  const xMax=pts[pts.length-1].dm;
  // Extend curve from x=0 so it "comes from below"
  const curveXMin=0;
  const curveXMax=xMax+(xMax*0.05);
  const steps=160;
  const curvePts=Array.from({length:steps+1},(_,i)=>{
    const x=curveXMin+(curveXMax-curveXMin)*i/steps;
    return{x,y:f(x)};
  });

  const vals=pts.map(b=>b[lcCurveMetric]);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const bMin=pts[vals.indexOf(mn)],bMax=pts[vals.indexOf(mx)];
  const slope=pts.length>1?(vals[vals.length-1]-vals[0]).toFixed(2):'0';

  // Stats bar
  $$('lc-st-min').textContent=mn.toFixed(2)+'%';
  $$('lc-st-min-sub').textContent=bMin.ticker+' · DM '+bMin.dm.toFixed(3)+'y';
  $$('lc-st-max').textContent=mx.toFixed(2)+'%';
  $$('lc-st-max-sub').textContent=bMax.ticker+' · DM '+bMax.dm.toFixed(3)+'y';
  $$('lc-st-slope').textContent=(+slope>=0?'+':'')+slope+'%';
  $$('lc-st-slope-sub').textContent=+slope>0?'curva empinada ▲':+slope<0?'curva invertida ▼':'curva plana';
  $$('lc-st-count').textContent=pts.length;
  $$('lc-st-count-sub').textContent=pts.filter(b=>b.type==='LECAP').length+' LECAP · '+pts.filter(b=>b.type==='BONCAP').length+' BONCAP';

  const canvas=$$('lc-curve-chart'),ctx=canvas.getContext('2d');

  // Y axis padding — extend downward so curve visually comes from below
  const yPad=(mx-mn)*0.18||0.3;
  const yMin=Math.max(0,mn-yPad*2);
  const yMax=mx+yPad;

  // Point styles: LECAP = circle (filled #4a7af0), BONCAP = diamond (#f0b429)
  const ptFill=pts.map(b=>b.type==='LECAP'?'rgba(91,141,239,.9)':'rgba(240,180,41,.9)');
  const ptBorder=pts.map(b=>b.type==='LECAP'?'#2a5abf':'#8a6820');
  const ptShape=pts.map(b=>b.type==='LECAP'?'circle':'rectRot');

  const datasets=[
    // Fit line — drawn first (order:2), no points
    {type:'line',label:'fit',data:curvePts,
      borderColor:lineColor,borderWidth:2.5,
      backgroundColor:'transparent',
      pointRadius:0,pointHoverRadius:0,
      tension:0.35,fill:false,order:2,
      datalabels:{display:false}},
    // Scatter — drawn on top (order:1)
    {type:'scatter',label:metricLabel,
      data:pts.map(b=>({x:b.dm,y:b[lcCurveMetric]})),
      backgroundColor:ptFill,borderColor:ptBorder,
      borderWidth:1.5,
      pointRadius:pts.map(b=>b.type==='LECAP'?7:8),
      pointHoverRadius:11,
      pointStyle:ptShape,
      order:1,
      datalabels:{
        display:true,
        align:c=>{const b=pts[c.dataIndex];return b.dm<xMax*0.15?'right':'top';},
        anchor:'end',offset:6,
        color:c=>pts[c.dataIndex].type==='LECAP'?'#7aadff':'#f0c060',
        font:{family:"'JetBrains Mono','Courier New',monospace",size:10,weight:'700'},
        formatter:(v,c)=>pts[c.dataIndex].ticker,
        textStrokeColor:'#030a14',textStrokeWidth:4,clip:false
      }}
  ];

  if(lcCurveChart){lcCurveChart.destroy();lcCurveChart=null;}
  lcCurveChart=new Chart(ctx,{
    type:'scatter',
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:420},
      layout:{padding:{top:30,right:44,left:6,bottom:8}},
      interaction:{mode:'nearest',intersect:true},
      plugins:{
        legend:{display:false},
        datalabels:{},
        tooltip:{
          filter:item=>item.datasetIndex===1,
          backgroundColor:'#060f1e',
          borderColor:'#2a4a7a',borderWidth:1,
          titleColor:'#7aa3f0',bodyColor:'#c8d8f0',
          padding:12,
          titleFont:{family:"'JetBrains Mono',monospace",size:11,weight:'700'},
          bodyFont:{family:"'JetBrains Mono',monospace",size:11},
          callbacks:{
            title:items=>{const b=pts[items[0].dataIndex];return b.ticker+'  ·  '+b.type+'  ·  Vence '+lcFmtDate(b.maturity);},
            label:item=>{const b=pts[item.dataIndex];return[
              '  TNA:  '+b.tna.toFixed(2)+'%   TEM: '+b.tem.toFixed(2)+'%',
              '  TIR:  '+b.tir.toFixed(2)+'%',
              '  Precio: '+lcFmtNum(b.price,3)+'  →  Pago: '+lcFmtNum(b.pagoFinal,3),
              '  DM: '+b.dm.toFixed(4)+' años   ('+b.days+' días)'
            ];}
          }
        }
      },
      scales:{
        x:{
          type:'linear',
          min:0,
          max:curveXMax+(xMax*0.04),
          grid:{color:'rgba(30,58,98,.55)',lineWidth:1},
          ticks:{color:'#4a6a8a',font:{family:"'JetBrains Mono',monospace",size:10},callback:v=>v.toFixed(1),maxTicksLimit:10},
          border:{color:'rgba(30,58,98,.8)'},
          title:{display:true,text:'DurM [360]',color:'#4a6a8a',
            font:{family:"'JetBrains Mono',monospace",size:9,weight:'600'},padding:{top:5}}
        },
        y:{
          min:yMin,max:yMax,
          grid:{color:'rgba(30,58,98,.55)',lineWidth:1},
          ticks:{color:'#4a6a8a',font:{family:"'JetBrains Mono',monospace",size:10},
            callback:v=>v.toFixed(2)+'%',maxTicksLimit:8},
          border:{color:'rgba(30,58,98,.8)'},
          title:{display:true,text:metricLabel,color:lineColor,
            font:{family:"'JetBrains Mono',monospace",size:10,weight:'700'},padding:{bottom:5}}
        }
      }
    }
  });
}

// TNA [180/360]: convención semi-anual estándar bonos USD
// price = Σ CF_i / (1+r_semi)^(2 × t_i)  donde t_i = días_i/360
// TNA = 2 × r_semi   (tasa nominal anual base semi-anual)
function bndSolveIRR(flows, dirty){
  const today=new Date();today.setHours(0,0,0,0);
  const futs=flows.filter(f=>new Date(f.date+'T00:00:00')>today);
  if(!futs.length||dirty<=0)return 0;
  const dt=futs.map(f=>Math.max(1,(new Date(f.date+'T00:00:00')-today)/86400000));
  // r = semi-annual yield; exponent = 2 * (days/360)
  const pv=r=>dt.reduce((s,t,i)=>s+futs[i].total/Math.pow(1+r,2*t/360),0);
  const dpv=r=>dt.reduce((s,t,i)=>s-(2*t/360)*futs[i].total/Math.pow(1+r,2*t/360+1),0);
  let r=0.04;
  for(let i=0;i<200;i++){
    const err=pv(r)-dirty,d=dpv(r);
    if(Math.abs(d)<1e-14)break;
    const step=err/d;r-=step;
    if(r<-0.5)r=0.001;if(r>5)r=0.5;
    if(Math.abs(step)<1e-10)break;
  }
  return Math.max(0,r);
}

// Duration [180/360]: MacD con t_i=días/360, ModD = MacD/(1+r_semi)
function bndCalcDuration(flows, rSemi){
  const today=new Date();today.setHours(0,0,0,0);
  const futs=flows.filter(f=>new Date(f.date+'T00:00:00')>today);
  let sPV=0,sTPV=0;
  for(const f of futs){
    const t=Math.max(1,(new Date(f.date+'T00:00:00')-today)/86400000)/360;
    const pvcf=f.total/Math.pow(1+rSemi,2*t);
    sPV+=pvcf;sTPV+=t*pvcf;
  }
  const macD=sPV>0?sTPV/sPV:0;
  const modD=rSemi>-1?macD/(1+rSemi):macD;
  return{macD,modD};
}

// Analytics principal — usa dirty price de API y cashflows del Excel
function bndAnalytics(ticker, dirtyPrice){
  const def=BOND_DEFS[ticker];
  if(!def||!dirtyPrice||dirtyPrice<=0)return null;
  const flows=CASHFLOW_DB[ticker];
  const today=new Date();today.setHours(0,0,0,0);
  const futureFlows=flows?flows.filter(f=>new Date(f.date+'T00:00:00')>today):[];
  if(!futureFlows.length)return null;
  const rSemi=bndSolveIRR(flows,dirtyPrice);
  const tna=rSemi*2*100; // TNA [180/360]
  const tir=(Math.pow(1+rSemi,2)-1)*100; // TEA [base 360]
  const{macD,modD}=bndCalcDuration(flows,rSemi);
  return{ticker,name:def.name,law:def.law,dirty:dirtyPrice,tna,tir,macD,modD,flows:futureFlows};
}

async function bndFetch(){

    }
  }catch(e){console.warn('bndFetch data912:',e);}

  // Fallback estatico si API no responde
  if(Object.keys(apiPrices).length===0){
    const fallback={AL29D:73.50,AL30D:60.80,AL35D:66.50,AL41D:62.00,GD29D:75.00,GD30D:62.00,GD35D:68.00,GD38D:64.50,GD41D:63.00,GD46D:60.50,AO27D:97.00,AO27:97.00,BPY26D:98.00,BPOA7D:96.00,BPD27D:95.00};

    bndSrc='referencia estatica';
    pill.textContent='⚠ OFFLINE (ref.)';
  }

  // Cruzar BOND_DEFS con precios API
  // Para cada bono busca: 1) ticker+D  2) ticker+C  3) ticker directo
  // data912 cotiza dirty en pesos para 'D' (MEP) y 'C' (cable)
  bndData=[];
  for(const tk of Object.keys(BOND_DEFS)){
    const candidates=[tk+'D',tk+'C',tk];
    let found=null;
    for(const c of candidates){if(apiPrices[c]){found={...apiPrices[c],apiTk:c};break;}}
    if(!found)continue;
    const analytics=bndAnalytics(tk,found.price);
    if(analytics){analytics.varPct=found.varPct;analytics.apiTk=found.apiTk;bndData.push(analytics);}
  }

  if(bndData.length>0){
    pill.className='bnd-status ok';
    pill.textContent='LIVE · '+bndData.length+' bonos';
  }else{
    pill.className='bnd-status err';
    pill.textContent='⚠ SIN DATOS';
  }
  $$('bnd-last-upd').textContent='✓ '+new Date().toLocaleTimeString('es-AR')+
    ' · '+bndData.length+'/'+Object.keys(BOND_DEFS).length+' bonos · '+bndSrc;
  bndRender();
  bndRenderCurve();
}

function bndRender(){

let bndCurveChart=null;
function bndRenderCurve(){
  const canvas=$$('bnd-curve-canvas');if(!canvas)return;
  // Build per-series arrays with TIR on Y
  const arPts=[],nyPts=[];
  for(const b of bndData){
    if(b.law==='AR') arPts.push({x:b.modD,y:b.tir,tna:b.tna,ticker:b.ticker});
    else if(b.law==='NY') nyPts.push({x:b.modD,y:b.tir,tna:b.tna,ticker:b.ticker});
  }
  arPts.sort((a,b)=>a.x-b.x);
  nyPts.sort((a,b)=>a.x-b.x);
  if(!arPts.length&&!nyPts.length)return;

  // Polynomial degree-2 least-squares (reuse soberanos inline)
  const mkFit=(data)=>{
    if(data.length<2)return null;
    const n=data.length;
    let sx=0,sx2=0,sx3=0,sx4=0,sy=0,sxy=0,sx2y=0;
    for(const p of data){sx+=p.x;sx2+=p.x*p.x;sx3+=p.x**3;sx4+=p.x**4;sy+=p.y;sxy+=p.x*p.y;sx2y+=p.x*p.x*p.y;}
    const A=[[n,sx,sx2],[sx,sx2,sx3],[sx2,sx3,sx4]];const B=[sy,sxy,sx2y];
    const a=A[0],b=A[1],c=A[2];
    const det=a[0]*(b[1]*c[2]-b[2]*c[1])-a[1]*(b[0]*c[2]-b[2]*c[0])+a[2]*(b[0]*c[1]-b[1]*c[0]);
    if(Math.abs(det)<1e-12)return null;
    const c0=(B[0]*(b[1]*c[2]-b[2]*c[1])-a[1]*(B[1]*c[2]-b[2]*B[2])+a[2]*(B[1]*c[1]-b[1]*B[2]))/det;
    const c1=(a[0]*(B[1]*c[2]-b[2]*B[2])-B[0]*(b[0]*c[2]-b[2]*c[0])+a[2]*(b[0]*B[2]-B[1]*c[0]))/det;
    const c2=(a[0]*(b[1]*B[2]-B[1]*c[1])-a[1]*(b[0]*B[2]-B[1]*c[0])+B[0]*(b[0]*c[1]-b[1]*c[0]))/det;
    return x=>c0+c1*x+c2*x*x;
  };

  const allPts=[...arPts,...nyPts];
  const xMax=Math.max(...allPts.map(p=>p.x));

  // Extend curve from x=0 (so it "comes from below")
  const buildCurve=(data,fitFn)=>{
    if(!fitFn||data.length<2)return[];
    const steps=120;
    return Array.from({length:steps+1},(_,i)=>{
      const x=(xMax+(xMax*0.05))*i/steps;
      return{x,y:fitFn(x)};
    });
  };

  const arFit=mkFit(arPts),nyFit=mkFit(nyPts);
  const arCurve=buildCurve(arPts,arFit),nyCurve=buildCurve(nyPts,nyFit);

  // Bloomberg-like colors: Bonares=crimson, Globales=gold
  const AR_LINE='#e05060',AR_DOT='rgba(210,70,90,.9)',AR_LBL='#e87080';
  const NY_LINE='#d4a020',NY_DOT='rgba(220,165,30,.9)',NY_LBL='#f0c040';

  const dlabels={display:true,align:'top',anchor:'end',offset:5,
    font:{family:"'JetBrains Mono',monospace",size:9,weight:'700'},
    textStrokeColor:'#030a14',textStrokeWidth:3,clip:false};

  const datasets=[
    // Fit curves (order 3 & 4 = behind)
    {type:'line',label:'fit-AR',data:arCurve,borderColor:AR_LINE,borderWidth:2.5,
     backgroundColor:'transparent',pointRadius:0,tension:0.3,fill:false,order:3,datalabels:{display:false}},
    {type:'line',label:'fit-NY',data:nyCurve,borderColor:NY_LINE,borderWidth:2.5,
     backgroundColor:'transparent',pointRadius:0,tension:0.3,fill:false,order:4,datalabels:{display:false}},
    // Scatter — Bonares AR
    {type:'scatter',label:'SOB USD BONAR',data:arPts,
     backgroundColor:AR_DOT,borderColor:AR_LINE,borderWidth:1.5,
     pointRadius:8,pointHoverRadius:11,pointStyle:'rectRot',
     order:1,datalabels:{...dlabels,color:AR_LBL,formatter:(v,c)=>arPts[c.dataIndex].ticker}},
    // Scatter — Globales NY
    {type:'scatter',label:'SOB USD GLOB',data:nyPts,
     backgroundColor:NY_DOT,borderColor:NY_LINE,borderWidth:1.5,
     pointRadius:8,pointHoverRadius:11,pointStyle:'rectRot',
     order:2,datalabels:{...dlabels,color:NY_LBL,formatter:(v,c)=>nyPts[c.dataIndex].ticker}},
  ];

  const allY=[...arPts,...nyPts].map(p=>p.y);
  const yMin=Math.max(0,Math.min(...allY)-1.5);
  const yMax=Math.max(...allY)+0.8;

  if(bndCurveChart){bndCurveChart.destroy();bndCurveChart=null;}
  const ctx=canvas.getContext('2d');

  bndCurveChart=new Chart(ctx,{
    type:'scatter',data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:320},
      layout:{padding:{top:28,right:44,left:6,bottom:6}},
      plugins:{
        legend:{
          display:true,
          position:'top',
          align:'start',
          labels:{
            color:'#7a99c4',
            font:{family:"'JetBrains Mono',monospace",size:9,weight:'700'},
            padding:16,
            usePointStyle:true,pointStyle:'rectRot',pointStyleWidth:10,
            filter:item=>item.datasetIndex>=2  // only scatter labels
          }
        },
        datalabels:{},
        tooltip:{
          filter:i=>i.datasetIndex>=2,
          backgroundColor:'#060f1e',borderColor:'#2a4a7a',borderWidth:1,
          titleColor:'#7aa3f0',bodyColor:'#c8d8f0',padding:12,
          titleFont:{family:"'JetBrains Mono',monospace",size:11,weight:'700'},
          bodyFont:{family:"'JetBrains Mono',monospace",size:11},
          callbacks:{
            title:items=>{const s=items[0].datasetIndex===2?arPts:nyPts;const p=s[items[0].dataIndex];return p.ticker+' · '+(items[0].datasetIndex===2?'Ley AR':'Ley NY');},
            label:item=>{const s=item.datasetIndex===2?arPts:nyPts;const p=s[item.dataIndex];return[
              '  TIR (TEA): '+p.y.toFixed(2)+'%',
              '  TNA [180/360]: '+p.tna.toFixed(2)+'%',
              '  DurMod [180/360]: '+p.x.toFixed(3)+'y'
            ];}
          }
        }
      },
      scales:{
        x:{
          type:'linear',min:0,max:xMax+(xMax*0.06),
          grid:{color:'rgba(30,58,98,.5)',lineWidth:1},
          ticks:{color:'#4a6a8a',font:{family:"'JetBrains Mono',monospace",size:9},callback:v=>v.toFixed(1)},
          border:{color:'rgba(30,58,98,.8)'},
          title:{display:true,text:'DurM [180/360]',color:'#4a6a8a',
            font:{family:"'JetBrains Mono',monospace",size:9,weight:'600'},padding:{top:5}}
        },
        y:{
          min:yMin,max:yMax,
          grid:{color:'rgba(30,58,98,.5)',lineWidth:1},
          ticks:{color:'#4a6a8a',font:{family:"'JetBrains Mono',monospace",size:9},callback:v=>v.toFixed(1)+'%'},
          border:{color:'rgba(30,58,98,.8)'},
          title:{display:true,text:'TIR (TEA) %',color:'#e87080',
            font:{family:"'JetBrains Mono',monospace",size:9,weight:'700'},padding:{bottom:5}}
        }
      }
    }
  });
}

function lcModalPDF(){

  const {jsPDF}=window.jspdf;

  const price=parseFloat($$('lc-inp-price').value)||bond.price;
  const invest=parseFloat($$('lc-inp-invest').value)||0;

  const costos=(parseFloat($$('lc-inp-arancel').value)||0)+(parseFloat($$('lc-inp-imp').value)||0);
  const effectivePrice=price*(1+costos/100);
  const vn=invest>0?invest/effectivePrice:0;

  const lk=bond.type==='LECAP'?CYN:AMB;

    doc.setFontSize(9);doc.setTextColor(...GRY);doc.setFont('helvetica','normal');
    doc.text(k,M+2,y);
    doc.setTextColor(...(vc||WHT));doc.setFont('helvetica','bold');
    doc.text(v,M+CW-2,y,'right');
    y+=8;

  row('Días restantes',bond.days+' días',GRY);
  row('Pago final por VN','$ '+lcFmtNum(bond.pagoFinal,3),AMB);
  y+=3;sec('PRECIO Y RENDIMIENTOS');
  row('Precio de compra','$ '+lcFmtNum(price,3),BLU);
  row('TNA',fmtP(yields.tna),WHT);
  row('TEM',fmtP(yields.tem),WHT);
  row('TIR (TEA)',fmtP(yields.tir),GRN);
  row('Duración Modificada (base 360)',lcModDuration(bond.days,yields.tir).toFixed(3)+' años',CYN);
  if(costos>0)row('Costos adicionales',fmtP(costos),RED);
  y+=3;sec('SIMULACIÓN DE COMPRA');
  row('Monto a invertir','$ '+fmtM(invest),BLU);
  row('Nominales a comprar',Math.floor(vn).toLocaleString('es-AR')+' VN',WHT);
  row('Precio efectivo','$ '+lcFmtNum(effectivePrice,3),GRY);
  y+=3;
  doc.setFillColor(10,40,22);doc.rect(M,y-4,CW,11,'F');
  doc.setFontSize(12);doc.setTextColor(...WHT);doc.setFont('helvetica','bold');
  doc.text('AL VENCIMIENTO COBRÁS',M+2,y+2);
  doc.setTextColor(...GRN);doc.text('$ '+fmtM(cobra),M+CW-2,y+2,'right');
  y+=15;

  doc.setFontSize(12);doc.setTextColor(...WHT);doc.setFont('helvetica','bold');
  doc.text('GANANCIA NETA',M+2,y+2);
  const gc=ganancia>=0?GRN:RED;
  doc.setTextColor(...gc);doc.text((ganancia>=0?'+ ':'- ')+'$ '+fmtM(Math.abs(ganancia)),M+CW-2,y+2,'right');
  piPdfFooter(doc);
  doc.save('LECAP_'+bond.ticker+'_'+new Date().toISOString().slice(0,10)+'.pdf');

/* ── Storage ── */
function arbLoad(){
  try{const r=localStorage.getItem(ARB_KEY);if(r)return JSON.parse(r);}catch(e){}
  return[];
}
function arbSave(h){try{localStorage.setItem(ARB_KEY,JSON.stringify(h));}catch(e){}}
function arbToday(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function arbFmtDate(iso){const[,m,d]=iso.split('-');return`${parseInt(d)}/${parseInt(m)}`;}

function arbInitSeed(){
  let h=arbLoad();
  const ex=new Set(h.map(x=>x.d));
  let changed=h.length===0;
  for(const x of ARB_SEED){
    if(!ex.has(x.d)){
      h.push({d:x.d,gd:x.gd,al:x.al,r:parseFloat(((x.gd/x.al-1)*100).toFixed(4))});
      changed=true;
    }
  }
  if(changed){h.sort((a,b)=>a.d.localeCompare(b.d));arbSave(h);}
  return arbLoad();
}

/* ── Calculations ── */
function arbCalcIndicators(ratios){
  const n=ratios.length;
  const mm21=new Array(n).fill(null);
  const mm9 =new Array(n).fill(null);
  const bsup=new Array(n).fill(null);
  const binf=new Array(n).fill(null);
  for(let i=0;i<n;i++){
    if(i>=ARB_PER-1){
      const sl=ratios.slice(i-ARB_PER+1,i+1);
      const mu=sl.reduce((s,v)=>s+v,0)/ARB_PER;
      const sigma=Math.sqrt(sl.reduce((s,v)=>s+(v-mu)**2,0)/ARB_PER);
      mm21[i]=mu;
      bsup[i]=mu+ARB_SIG*sigma;
      binf[i]=mu-ARB_SIG*sigma;
    }
    if(i>=ARB_MA9-1){
      const sl2=ratios.slice(i-ARB_MA9+1,i+1);
      mm9[i]=sl2.reduce((s,v)=>s+v,0)/ARB_MA9;
    }
  }
  return{mm21,mm9,bsup,binf};
}

function arbStatsFor(ratios,n){
  const sl=ratios.slice(-n).filter(v=>v!=null);
  if(!sl.length)return{hi:null,med:null,lo:null};
  return{hi:Math.max(...sl),med:sl.reduce((s,v)=>s+v,0)/sl.length,lo:Math.min(...sl)};
}

function arbAccion(r,sup,inf,mm21){
  if(mm21===null)return'Nada';
  if(r>mm21)return'Rotar a AL';
  if(r<mm21)return'Rotar a GD';
  return'Nada';
}

/* ── Render ── */
function arbRender(hist,lGD,lAL){
  // Build working array (may include a live point not yet saved)
  const work=[...hist];
  const today=arbToday();
  let liveR=null;
  if(lGD&&lAL){
    liveR=parseFloat(((lGD/lAL-1)*100).toFixed(4));
    const idx=work.findIndex(x=>x.d===today);
    if(idx>=0)work[idx]={...work[idx],gd:lGD,al:lAL,r:liveR,_live:true};
    else work.push({d:today,gd:lGD,al:lAL,r:liveR,_live:true});
  }

  const ratios=work.map(x=>x.r);
  const {mm21,mm9,bsup,binf}=arbCalcIndicators(ratios);
  const n=work.length;
  const lastMM21=mm21[n-1],lastMM9=mm9[n-1],lastBsup=bsup[n-1],lastBinf=binf[n-1];
  const lastR=ratios[n-1];
  const labels=work.map(x=>arbFmtDate(x.d));

  // ── Current values ──
  const fmtP=v=>v!==null?v.toFixed(2)+'%':'—';
  $$('arb-bsup-val').textContent=fmtP(lastBsup);
  $$('arb-binf-val').textContent=fmtP(lastBinf);
  $$('arb-ratio-val').textContent=fmtP(lastR);
  $$('arb-gauge-num').textContent=lastR!==null?lastR.toFixed(2)+'%':'—';
  $$('arb-upd-line').textContent='Actualizado: '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const accion=arbAccion(lastR,lastBsup,lastBinf,lastMM21);
  const aBox=$$('arb-accion-box');
  aBox.className='arb-accion-box '+(accion==='Rotar a AL'?'rota-al':accion==='Rotar a GD'?'rota-gd':'nada');
  aBox.innerHTML=`<span>¿Qué hacer?</span><span style="font-size:13px">${accion}</span>`;

  // ── Gauge ──
  arbDrawGauge(lastR,lastBsup,lastBinf,lastMM21);

  // ── Stats ──
  for(const[cnt,pfx]of[[5,'arb-s5'],[20,'arb-s20'],[60,'arb-s60'],[100,'arb-s100']]){
    const s=arbStatsFor(ratios,cnt);
    $$(`${pfx}-hi`).textContent=fmtP(s.hi);
    $$(`${pfx}-med`).textContent=fmtP(s.med);
    $$(`${pfx}-lo`).textContent=fmtP(s.lo);
  }

  // ── Hist table ──
  const tbody=$$('arb-hist-tbody');
  tbody.innerHTML=[...hist].reverse().map((row,i,arr)=>{
    // Get mm21 for this row by position in full work array
    const wi=work.findIndex(x=>x.d===row.d);
    const rowMM21=wi>=0?mm21[wi]:null;
    const rc=rowMM21!==null?(row.r>rowMM21?'arb-ratio-hi':'arb-ratio-lo'):'';
    const isToday=row.d===today;
    return`<tr${isToday?' class="arb-today"':''}>
      <td>${arbFmtDate(row.d)}</td>
      <td class="${rc}">${row.r.toFixed(2)}%</td>
    </tr>`;
  }).join('');
  $$('arb-hist-count').textContent=hist.length+' ruedas';

  // ── Desvíos table ──
  if(lastMM21!==null){
    const slS=ratios.slice(-ARB_PER).filter(v=>v!==null);
    const muS=slS.reduce((s,v)=>s+v,0)/slS.length;
    const stdS=Math.sqrt(slS.reduce((s,v)=>s+(v-muS)**2,0)/slS.length);
    const sigmas=[0.50,0.75,1.00,1.25,1.50,1.75,2.00,2.25,2.50,3.00];
    $$('arb-desv-tbody').innerHTML=sigmas.map(sg=>{
      const sup=lastMM21+sg*stdS,inf_=lastMM21-sg*stdS;
      const act=sg===ARB_SIG;
      return`<tr${act?' class="arb-desv-active"':''}>
        <td>${sg.toFixed(2)}</td>
        <td>${lastMM21.toFixed(2)}%</td>
        <td class="d-sup">${sup.toFixed(2)}%</td>
        <td class="d-inf">${inf_.toFixed(2)}%</td>
        <td>${lastMM9!==null?lastMM9.toFixed(2)+'%':'—'}</td>
      </tr>`;
    }).join('');
  }

  // ── Charts ──
  arbRenderCharts(work,labels,ratios,mm21,mm9,bsup,binf);
}

/* Live patch — updates only last data point without full chart rebuild */
function arbUpdateChartLive(gd,al,ratio,label){
  if(!arbPxChart||!arbRatioChart)return;
  const px=arbPxChart.data;
  const li=px.labels.length-1;
  // Update or append today's label
  const todayLbl=label||arbFmtDate(arbToday());
  if(px.labels[li]===todayLbl){
    px.datasets[0].data[li]=gd;
    px.datasets[1].data[li]=al;
  } else {
    px.labels.push(todayLbl);
    px.datasets[0].data.push(gd);
    px.datasets[1].data.push(al);
    if(px.labels.length>30){px.labels.shift();px.datasets[0].data.shift();px.datasets[1].data.shift();}
  }
  arbPxChart.update('none');

  const rx=arbRatioChart.data;
  const li2=rx.labels.length-1;
  if(rx.labels[li2]===todayLbl){
    rx.datasets[4].data[li2]=ratio; // Ratio dataset is index 4
  } else {
    rx.labels.push(todayLbl);
    rx.datasets.forEach((ds,i)=>{ ds.data.push(i===4?ratio:null); });
    if(rx.labels.length>30){rx.labels.shift();rx.datasets.forEach(ds=>ds.data.shift());}
  }
  arbRatioChart.update('none');
}

/* ── Gauge ── */
function arbDrawGauge(ratio,bsup,binf,mm21){
  const el=$$('arb-gauge-svg');if(!el)return;
  if(bsup===null||binf===null||ratio===null){el.innerHTML='';return;}

  const W=214,H=132,cx=107,cy=92,Ro=76,Ri=52;
  const margin=(bsup-binf)*0.55;
  const minV=Math.max(0,binf-margin),maxV=bsup+margin;

  // SVG angles: 0=right, 90=down. Gauge from 145° to 395°(=35°), spanning 250° through the top
  const A0=145,SWEEP=250;
  const toRad=d=>d*Math.PI/180;
  const pt=(deg,r)=>[cx+r*Math.cos(toRad(deg)),cy+r*Math.sin(toRad(deg))];
  const vToA=v=>A0+Math.max(0,Math.min(1,(v-minV)/(maxV-minV)))*SWEEP;

  const ring=(a1,a2,ro,ri)=>{
    const[ox1,oy1]=pt(a1,ro),[ox2,oy2]=pt(a2,ro);
    const[ix2,iy2]=pt(a2,ri),[ix1,iy1]=pt(a1,ri);
    const lg=(a2-a1)>180?1:0;
    return`M${ox1.toFixed(1)},${oy1.toFixed(1)} A${ro},${ro} 0 ${lg} 1 ${ox2.toFixed(1)},${oy2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ri},${ri} 0 ${lg} 0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z`;
  };

  const aInf=vToA(binf),aSup=vToA(bsup),aNeedle=vToA(ratio);
  const needlePt=pt(aNeedle,Ro-8);

  // ticks every 0.5
  const tickMarks=[];
  for(let v=Math.ceil(minV*2)/2;v<=maxV+0.001;v+=0.5){
    const a=vToA(v),major=true;
    const[x1,y1]=pt(a,Ro-1),[x2,y2]=pt(a,Ro-10);
    tickMarks.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#3a5a8a" stroke-width="1"/>`);
    // small ticks in between
    if(v+0.25<=maxV){const a2=vToA(v+0.25);const[tx1,ty1]=pt(a2,Ro-1),[tx2,ty2]=pt(a2,Ro-5);
      tickMarks.push(`<line x1="${tx1.toFixed(1)}" y1="${ty1.toFixed(1)}" x2="${tx2.toFixed(1)}" y2="${ty2.toFixed(1)}" stroke="#2a3a5a" stroke-width="0.5"/>`);}
  }
  // labels
  const tickLabels=[];
  for(let v=Math.ceil(minV*2)/2;v<=maxV+0.001;v+=0.5){
    const a=vToA(v);const[lx,ly]=pt(a,Ro+14);
    if(lx>4&&lx<W-4&&ly>4&&ly<H+2)
      tickLabels.push(`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="#4a6a9a" font-family="'JetBrains Mono',monospace" font-size="8" text-anchor="middle" dominant-baseline="middle">${v.toFixed(1)}</text>`);
  }
  // band labels
  const[bix,biy]=pt(aInf,Ro+20),[bsx,bsy]=pt(aSup,Ro+20);

  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <path d="${ring(A0,A0+SWEEP,Ro,Ri)}" fill="#0d1b2e" stroke="#1a2d4a" stroke-width="0.5"/>
  <path d="${ring(A0,Math.max(A0,Math.min(aInf,A0+SWEEP)),Ro-1,Ri+1)}" fill="rgba(22,100,52,0.45)"/>
  <path d="${ring(Math.max(A0,aInf),Math.min(aSup,A0+SWEEP),Ro-1,Ri+1)}" fill="rgba(26,52,90,0.5)"/>
  <path d="${ring(Math.max(A0,aSup),A0+SWEEP,Ro-1,Ri+1)}" fill="rgba(120,25,25,0.45)"/>
  ${tickMarks.join('')}
  ${tickLabels.join('')}
  <line x1="${pt(aInf,Ri)[0].toFixed(1)}" y1="${pt(aInf,Ri)[1].toFixed(1)}" x2="${pt(aInf,Ro)[0].toFixed(1)}" y2="${pt(aInf,Ro)[1].toFixed(1)}" stroke="#22d68a" stroke-width="2"/>
  <line x1="${pt(aSup,Ri)[0].toFixed(1)}" y1="${pt(aSup,Ri)[1].toFixed(1)}" x2="${pt(aSup,Ro)[0].toFixed(1)}" y2="${pt(aSup,Ro)[1].toFixed(1)}" stroke="#f0b429" stroke-width="2"/>
  <text x="${bix.toFixed(1)}" y="${(biy+1).toFixed(1)}" fill="#22d68a" font-family="'JetBrains Mono',monospace" font-size="7.5" text-anchor="middle" dominant-baseline="middle">${binf.toFixed(2)}</text>
  <text x="${bsx.toFixed(1)}" y="${(bsy+1).toFixed(1)}" fill="#f0b429" font-family="'JetBrains Mono',monospace" font-size="7.5" text-anchor="middle" dominant-baseline="middle">${bsup.toFixed(2)}</text>
  <line x1="${cx}" y1="${cy}" x2="${needlePt[0].toFixed(1)}" y2="${needlePt[1].toFixed(1)}" stroke="#22d4f0" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="${cx}" cy="${cy}" r="7.5" fill="#0d1b2e" stroke="#2a4a7a" stroke-width="1.5"/>
  <circle cx="${cx}" cy="${cy}" r="3" fill="#22d4f0"/>
  </svg>`;
}

/* ── Live fetch ── */
async function arbFetch(){
  if(!$$('page-arb').classList.contains('active')&&arbReady)return;
  const dot=$$('arb-dot');
  dot.className='arb-live-dot loading';
  $$('arb-status').textContent='ACTUALIZANDO...';
  try{
    const data=await pfetch('https://data912.com/live/arg_bonds');
    if(Array.isArray(data)){
      const find=tk=>{for(const b of data){const t=(b.ticker||b.symbol||b.t||'').trim().toUpperCase();if(t===tk){const v=parseFloat(b.price||b.c||b.ultimo||b.last||0);return v>0?v:null;}}return null;};
      arbLiveGD=find('GD30');arbLiveAL=find('AL30');
    }
  }catch(e){console.warn('arb fetch err:',e);}
  const hist=arbLoad();
  if(arbLiveGD&&arbLiveAL){
    dot.className='arb-live-dot';
    $$('arb-status').textContent=`GD30: ${Math.round(arbLiveGD).toLocaleString('es-AR')} | AL30: ${Math.round(arbLiveAL).toLocaleString('es-AR')} | LIVE`;
  }else{
    dot.className='arb-live-dot error';
    $$('arb-status').textContent='Sin live — mostrando histórico';
  }
  arbRender(hist,arbLiveGD,arbLiveAL);
  // After first full render, subsequent fetches just patch the live point
  if(arbReady&&arbPxChart&&arbLiveGD&&arbLiveAL){
    const liveR=parseFloat(((arbLiveGD/arbLiveAL-1)*100).toFixed(4));
    arbUpdateChartLive(arbLiveGD,arbLiveAL,liveR,arbFmtDate(arbToday()));
  }
}

/* ── Save today ── */
function arbSaveToday(){
  if(!arbLiveGD||!arbLiveAL){
    if($$('arb-dot').classList.contains('error')){alert('Sin precios live. Intentá actualizar primero.');return;}
    alert('Esperando datos live…');return;
  }
  const today=arbToday();
  let h=arbLoad();
  const idx=h.findIndex(x=>x.d===today);
  const rec={d:today,gd:Math.round(arbLiveGD),al:Math.round(arbLiveAL),r:parseFloat(((arbLiveGD/arbLiveAL-1)*100).toFixed(4))};
  if(idx>=0)h[idx]=rec;else{h.push(rec);h.sort((a,b)=>a.d.localeCompare(b.d));}
  arbSave(h);
  const btn=$$('arb-save-btn');
  btn.textContent='✓ Guardado';setTimeout(()=>btn.textContent='⊕ REGISTRAR HOY',2000);
  arbRender(h,arbLiveGD,arbLiveAL);
}

/* ── Delete history (for dev) ── */
function arbClearHistory(){
  if(!confirm('¿Borrar todo el historial de arbitraje? Esta acción es irreversible.'))return;
  localStorage.removeItem(ARB_KEY);
  arbInitSeed();
  arbRender(arbLoad(),arbLiveGD,arbLiveAL);
}

/* ── Init ── */
function arbInit(){
  arbInitSeed();
  arbReady=true;
  arbFetch();
  setInterval(()=>{if($$('page-arb').classList.contains('active'))arbFetch();},10000);
}

// Hook showPage to lazy-init arb on first visit
const _origShowPage=showPage;
showPage=function(id){
  _origShowPage(id);
  if(id==='arb'&&!arbReady)arbInit();
};


    if (typeof showPage === 'function') showPage('resumen');
  } catch (err) {
    document.getElementById('page-mount').innerHTML = '<div style="padding:24px;font-family:Arial,sans-serif;color:white">Error cargando módulos: '+err.message+'</div>';
    console.error(err);
  }
})();
